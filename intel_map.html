<!DOCTYPE html>
<html>
<head>
    <title>LIVE INTEL DASHBOARD</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            display: flex;
            font-family: Arial;
            background: #0b1a2a;
            color: white;
        }

        #map {
            height: 100vh;
            width: 75%;
        }

        #sidebar {
            width: 25%;
            background: #0f2438;
            padding: 15px;
            overflow-y: auto;
        }

        .event {
            padding: 10px;
            margin-bottom: 10px;
            background: #132f4c;
        }

        .CRITICAL { border-left: 5px solid red; }
        .HIGH { border-left: 5px solid orange; }
        .MEDIUM { border-left: 5px solid yellow; }
    </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
    <h2>LIVE INTEL</h2>
    <div id="events"></div>
</div>

<script>
    const API_URL = "https://intel-system.onrender.com/events"; // 🔥 CHANGE THIS

    const map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let markers = [];

    function getColor(threat) {
        if (threat === "CRITICAL") return "red";
        if (threat === "HIGH") return "orange";
        if (threat === "MEDIUM") return "yellow";
        return "blue";
    }

    async function loadEvents() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            markers.forEach(m => map.removeLayer(m));
            markers = [];

            const container = document.getElementById("events");
            container.innerHTML = "";

            data.forEach(event => {
                const marker = L.circleMarker([event.lat, event.lon], {
                    radius: 8,
                    color: getColor(event.threat)
                }).addTo(map);

                markers.push(marker);

                const div = document.createElement("div");
                div.className = "event " + event.threat;
                div.innerHTML = `<b>${event.title}</b>`;
                container.appendChild(div);
            });

        } catch (err) {
            console.error("Error loading events:", err);
        }
    }

    loadEvents();
    setInterval(loadEvents, 10000);
</script>

</body>
</html>
