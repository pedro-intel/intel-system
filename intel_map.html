<!DOCTYPE html>
<html>
<head>
    <title>Intel Map</title>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <style>
        body { margin: 0; }
        #map { height: 100vh; }

        .log {
            position: absolute;
            top: 10px;
            right: 10px;
            background: black;
            color: lime;
            padding: 10px;
            font-size: 12px;
            max-width: 300px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="log" id="log">Starting...</div>

<script>
    const map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const markers = L.markerClusterGroup();
    map.addLayer(markers);

    const log = document.getElementById("log");

    function logMsg(msg) {
        log.innerHTML += "<br>" + msg;
    }

    const ws = new WebSocket("wss://intel-system.onrender.com/ws");

    ws.onopen = () => {
        logMsg("✅ Connected");
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        logMsg("📡 " + data.message);

        let color = "blue";

        if (data.type === "critical") color = "red";
        if (data.type === "political") color = "orange";
        if (data.type === "economic") color = "green";

        const marker = L.circleMarker([data.lat, data.lng], {
            radius: 8,
            color: color
        });

        marker.bindPopup(data.message);

        markers.addLayer(marker);
    };
</script>

</body>
</html>
