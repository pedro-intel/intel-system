<!DOCTYPE html>
<html>
<head>
    <title>Live Intel Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
        }

        #status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: black;
            color: lime;
            padding: 10px;
            font-family: monospace;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="status">Starting...</div>

<script>
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);


// 🌐 FIXED WEBSOCKET (IMPORTANT)
const protocol = window.location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${protocol}://${window.location.host}/ws`);

const statusBox = document.getElementById("status");


ws.onopen = () => {
    console.log("✅ WebSocket connected");
    statusBox.innerHTML = "🟢 WS CONNECTED";
};

ws.onmessage = (event) => {
    console.log("📡 RAW:", event.data);

    const data = JSON.parse(event.data);

    const marker = L.marker([data.lat, data.lng]).addTo(map);

    marker.bindPopup(`
        <b>${data.type.toUpperCase()}</b><br>
        ${data.message}<br>
        <small>${data.time}</small>
    `);

    statusBox.innerHTML = "📡 Receiving data...";
};

ws.onerror = (err) => {
    console.error("❌ WS error:", err);
    statusBox.innerHTML = "❌ WS ERROR";
};

ws.onclose = () => {
    statusBox.innerHTML = "🔴 DISCONNECTED";
};
</script>

</body>
</html>
