app = "intel-system"
primary_region = "mia"  # Miami — closest to Puerto Rico

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # Never spin down (unlike Render free)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
